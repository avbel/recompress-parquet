name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: recompress-parquet
            asset_name: recompress-parquet-linux-x64
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: recompress-parquet
            asset_name: recompress-parquet-macos-arm64
            archive: zip

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: recompress-parquet.exe
            asset_name: recompress-parquet-windows-x64
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Package (zip - Unix)
        if: matrix.archive == 'zip' && matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          zip ../../../${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}

      - name: Package (zip - Windows)
        if: matrix.archive == 'zip' && matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.asset_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/recompress-parquet-linux-x64/recompress-parquet-linux-x64.tar.gz
            artifacts/recompress-parquet-macos-arm64/recompress-parquet-macos-arm64.zip
            artifacts/recompress-parquet-windows-x64/recompress-parquet-windows-x64.zip
          generate_release_notes: true

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums and generate formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_LINUX=$(sha256sum artifacts/recompress-parquet-linux-x64/recompress-parquet-linux-x64.tar.gz | awk '{print $1}')
          SHA_MACOS=$(sha256sum artifacts/recompress-parquet-macos-arm64/recompress-parquet-macos-arm64.zip | awk '{print $1}')

          cat > recompress-parquet.rb <<FORMULA
          class RecompressParquet < Formula
            desc "CLI tool to recompress Apache Parquet files with a different compression codec"
            homepage "https://github.com/avbel/recompress-parquet"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/avbel/recompress-parquet/releases/download/v#{version}/recompress-parquet-macos-arm64.zip"
                sha256 "${SHA_MACOS}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/avbel/recompress-parquet/releases/download/v#{version}/recompress-parquet-linux-x64.tar.gz"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              bin.install "recompress-parquet"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/recompress-parquet --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' recompress-parquet.rb

      - name: Push formula to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/avbel/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp recompress-parquet.rb tap/Formula/recompress-parquet.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/recompress-parquet.rb
          git commit -m "Update recompress-parquet to ${GITHUB_REF_NAME#v}"
          git push
